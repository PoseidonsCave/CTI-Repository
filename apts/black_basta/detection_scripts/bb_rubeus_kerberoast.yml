title: Black Basta Rubeus Kerberoast Collection
id: 6e49a0d2-c9e7-472e-b4a9-1f2d8644f1d8
status: experimental
description: >
  Detects a Rubeus Kerberoast execution pattern that matches the hashcat-formatted collection syntax shared
  in later Black Basta logs. NOTE — The image-path check is trivially defeated by renaming the binary.
  For broader coverage, combine with a rule that keys on Kerberos TGS-REQ volume or 4769 event spikes.
references:
  - https://attack.mitre.org/techniques/T1558/003/
author: PoseidonsCave
date: 2026-04-12
tags:
  - attack.credential-access
  - attack.t1558.003
  - blackbasta
logsource:
  category: process_creation
  product: windows
detection:
  image:
    Image|endswith: '\Rubeus.exe'
  command:
    CommandLine|contains|all:
      - 'kerberoast'
      - '/format:hashcat'
  outfile:
    CommandLine|contains:
      - 'kekhash.txt'
      - '\Users\Public\'
  condition: image and command and outfile
falsepositives:
  - Authorized red team use of Rubeus in a controlled assessment
  - Internal adversary-emulation activity with explicit approval
level: high