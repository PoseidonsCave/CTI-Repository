title: Black Basta Proxychains Secretsdump Usage
id: 6fcb3431-eb58-48b2-9368-eb83be2e57ff
status: experimental
description: Detects a Linux process execution pattern matching the Black Basta workflow of running secretsdump.py through proxychains against host lists.
references:
  - https://attack.mitre.org/techniques/T1003/
  - https://attack.mitre.org/techniques/T1018/
author: PoseidonsCave
date: 2026-04-12
tags:
  - attack.credential-access
  - attack.discovery
  - attack.t1003
  - attack.t1018
  - blackbasta
logsource:
  category: process_creation
  product: linux
detection:
  selection:
    CommandLine|contains|all:
      - 'proxychains'
      - 'secretsdump.py'
      - '-inputfile'
  condition: selection
falsepositives:
  - Authorized internal security testing
  - Red team exercises using Impacket through controlled relays
level: high